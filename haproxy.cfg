global
    log stdout format raw local0

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 1m
    timeout server 1m

resolvers docker_dns
    nameserver dns1 127.0.0.11:53
    resolve_retries 10
    timeout retry 1s
    hold valid 10s

listen mysql_cluster
    bind *:3307
    mode tcp
    balance first
    server mysql-master mysql-master:3306 check resolvers docker_dns
    server mysql-replica mysql-replica:3306 check backup resolvers docker_dns
